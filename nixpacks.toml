# Nixpacks build config for the paynpik API.
#
# Used by Dokploy when paynpik-api is configured with:
#   Build Type   = Nixpacks
#   Build Path   = / (repo root)
#
# The admin and customer SPAs should NOT use this — configure them as
# Build Type = Static with their own per-app build command instead.

[phases.setup]
# openssl is required at runtime for the Prisma query engine binary;
# without it the API crashes on first DB call with a libssl error.
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# `npm run build` for apps/api now runs `prisma generate && nest build`
# internally (see apps/api/package.json) so the build always emits a
# fresh client even when Nixpacks caches the install layer.
cmds = [
  "npm run build --workspace=apps/api",
]

[start]
# Regenerate the client at boot too — belt-and-braces for the case
# where the build layer is cached but node_modules was reset; migrate
# deploy is idempotent so re-running it across boots is safe.
cmd = "cd apps/api && npx prisma generate && npx prisma migrate deploy && node dist/src/main.js"
