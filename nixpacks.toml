# Nixpacks build config for the paynpik API.
#
# Used by Dokploy when paynpik-api is configured with:
#   Build Type   = Nixpacks
#   Build Path   = / (repo root)
#
# The admin and customer SPAs should NOT use this — configure them as
# Build Type = Static with their own per-app build command instead.

[phases.setup]
# openssl is required at runtime for the Prisma query engine binary;
# without it the API crashes on first DB call with a libssl error.
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# prisma generate MUST run before nest build — the TS compiler needs the
# generated client types (every new schema model / column lands here).
# If you swap the order, build fails the moment a migration adds a field.
cmds = [
  "cd apps/api && npx prisma generate",
  "npm run build --workspace=apps/api",
]

[start]
# prisma migrate deploy is idempotent — safe to run on every boot.
# If a deploy ships a new migration, it applies it before the API listens.
cmd = "cd apps/api && npx prisma migrate deploy && node dist/src/main.js"
