<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B4245" />
  <title>PayNPik</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FAFAFA;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .wrap { padding: 24px; max-width: 420px; }
    .logo {
      width: 72px; height: 72px; border-radius: 16px;
      background: linear-gradient(135deg, #0B4245, #073032);
      color: #fff; font-size: 36px; font-weight: 800;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 18px; box-shadow: 0 8px 24px rgba(249,115,22,.25);
    }
    h1 { margin: 0; color: #0f172a; font-size: 22px; font-weight: 800; }
    p  { margin: 12px 0 0; color: #64748b; font-size: 14px; line-height: 1.5; }
    .spinner {
      margin: 22px auto 0; width: 28px; height: 28px;
      border: 3px solid #D2E5DF; border-top-color: #0B4245;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!--
    This page is only seen if the WebView can't reach
    https://order.vezeor.cloud on first launch (no network,
    DNS failure, etc.). The Capacitor server.url config redirects
    away from this file as soon as the network is reachable.
  -->
  <div class="wrap">
    <div class="logo">P</div>
    <h1>Loading PayNPik…</h1>
    <p>If you stay on this screen, please check your internet connection and reopen the app.</p>
    <div class="spinner" aria-hidden="true"></div>
  </div>
  <script>
    // Retry remote load if the device comes back online while
    // this fallback is showing.
    function reloadIfOnline() {
      if (navigator.onLine) location.href = 'https://order.vezeor.cloud';
    }
    window.addEventListener('online', reloadIfOnline);
    setTimeout(reloadIfOnline, 3000);
  </script>
</body>
</html>
