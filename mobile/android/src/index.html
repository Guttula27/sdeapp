<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B4245" />
  <title>VEZEOR</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0B4245;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .wrap {
      padding: 24px; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeIn 380ms ease both;
    }
    .logo {
      width: 132px; height: 132px;
      animation: float 2.2s ease-in-out infinite;
    }
    .wordmark {
      margin-top: 22px;
      letter-spacing: 0.18em;
      font-weight: 800;
      font-size: 24px;
      color: #C8A75B;
    }
    .tag {
      margin-top: 4px;
      letter-spacing: 0.32em;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
    }
    .hint {
      margin: 28px 0 0; color: rgba(255,255,255,0.55);
      font-size: 13px; line-height: 1.5;
    }
    .spinner {
      margin: 22px auto 0; width: 28px; height: 28px;
      border: 3px solid rgba(200,167,91,0.25);
      border-top-color: #C8A75B;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!--
    Shown only if the WebView can't reach https://order.vezeor.cloud
    on first launch (no network / DNS failure). The Capacitor server.url
    config takes over as soon as the network is reachable. The native
    Capacitor splash plugin already showed the brand icon for 1500ms
    before this page is ever rendered.
  -->
  <div class="wrap">
    <img class="logo" src="./logo.png" alt="VEZEOR" />
    <div class="wordmark">VEZEOR</div>
    <div class="tag">VERY EASY TO ORDER</div>
    <div class="spinner" aria-hidden="true"></div>
    <p class="hint">
      Loading your menu…<br />
      If you stay on this screen, please check your internet connection.
    </p>
  </div>
  <script>
    // Retry remote load if the device comes back online while
    // this fallback is showing.
    function reloadIfOnline() {
      if (navigator.onLine) location.href = 'https://order.vezeor.cloud';
    }
    window.addEventListener('online', reloadIfOnline);
    setTimeout(reloadIfOnline, 3000);
  </script>
</body>
</html>
