apiVersion: apps/v1
kind: Deployment
metadata:
  name: paynpik-web
  namespace: paynpik
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paynpik-web
  template:
    metadata:
      labels:
        app: paynpik-web
    spec:
      containers:
        - name: web
          image: paynpik/web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: paynpik-web-service
  namespace: paynpik
spec:
  selector:
    app: paynpik-web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paynpik-customer
  namespace: paynpik
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paynpik-customer
  template:
    metadata:
      labels:
        app: paynpik-customer
    spec:
      containers:
        - name: customer
          image: paynpik/customer:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: paynpik-customer-service
  namespace: paynpik
spec:
  selector:
    app: paynpik-customer
  ports:
    - port: 80
      targetPort: 80
