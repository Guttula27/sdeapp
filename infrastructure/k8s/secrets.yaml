apiVersion: v1
kind: Secret
metadata:
  name: paynpik-secrets
  namespace: paynpik
type: Opaque
stringData:
  DATABASE_URL: "postgresql://paynpik:STRONG_PASSWORD@postgres-service:5432/paynpik_db"
  JWT_SECRET: "CHANGE_ME_TO_A_STRONG_SECRET"
  JWT_REFRESH_SECRET: "CHANGE_ME_TO_ANOTHER_SECRET"
  REDIS_URL: "redis://redis-service:6379"
  RAZORPAY_KEY_ID: "your_razorpay_key"
  RAZORPAY_KEY_SECRET: "your_razorpay_secret"
