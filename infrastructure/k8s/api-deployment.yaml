apiVersion: apps/v1
kind: Deployment
metadata:
  name: paynpik-api
  namespace: paynpik
spec:
  replicas: 3
  selector:
    matchLabels:
      app: paynpik-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: paynpik-api
    spec:
      containers:
        - name: api
          image: paynpik/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: paynpik-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: "3001"
            - name: FRONTEND_URL
              value: "https://admin.paynpik.com"
            - name: CUSTOMER_URL
              value: "https://order.paynpik.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: paynpik-api-service
  namespace: paynpik
spec:
  selector:
    app: paynpik-api
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paynpik-api-hpa
  namespace: paynpik
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paynpik-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
