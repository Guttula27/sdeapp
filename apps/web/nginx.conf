server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets are immutable — cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: unknown route → index.html (React Router handles it).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Entry HTML must never be cached so deploys roll out promptly.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
