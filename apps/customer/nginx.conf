server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ─── PWA service worker + manifest ────────────────────────
  # Service worker and PWA manifest MUST NOT be cached by upstream
  # proxies — otherwise a new deploy is invisible to installed PWAs
  # because their workers keep serving the old precache.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    expires 0;
    try_files $uri =404;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    types { } default_type "application/manifest+json";
    try_files $uri =404;
  }

  # ─── Hashed assets ────────────────────────────────────────
  # Vite emits content-hashed filenames so we can cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ─── SPA fallback ─────────────────────────────────────────
  # Any non-asset, non-PWA path falls back to index.html so React
  # Router can handle deep links (/scan/:tableId, /menu/:outletId, etc).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Entry HTML must always revalidate — it's the bootstrap.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
