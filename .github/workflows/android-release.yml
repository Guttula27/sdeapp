# VEZEOR Android APK build pipeline.
#
# Builds the customer wrapper APK (currently: staging only — duplicate
# the matrix entry to add production once you have a domain).
#
# Triggers:
#   - push of tag matching `mobile-v*` → release build → attached to a
#     GitHub Release of the same name
#   - manual dispatch from the Actions tab → choose debug or release
#
# Required GitHub repository secrets (Settings → Secrets and variables
# → Actions). Without these, only debug builds work:
#
#   ANDROID_KEYSTORE_BASE64   — base64 of your release keystore file
#                               (generate with `base64 -i path/to/file.keystore`)
#   ANDROID_KEYSTORE_PASSWORD — keystore password set when you ran keytool
#   ANDROID_KEY_ALIAS         — the key alias (e.g. "vezeor")
#   ANDROID_KEY_PASSWORD      — the key password

name: Android APK

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'debug (unsigned, for testing) or release (signed)'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

permissions:
  contents: write   # for attaching APKs to GitHub Releases on tag push

# Opt every JavaScript action (checkout, setup-node, setup-java,
# setup-android, upload-artifact, action-gh-release, etc.) into the
# Node.js 24 runtime on the runner. Suppresses the Node 20
# deprecation warning and survives the cutover scheduled for
# 2026-06-16 when GitHub flips the default. Has no effect on the
# Node version we use to build with `npm install` — that's
# controlled by `actions/setup-node` separately.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add `production` here when you have env/production.json:
        # env_name: [staging, production]
        env_name: [staging]
    env:
      APP_ENV: ${{ matrix.env_name }}
      # Tag pushes default to release; manual dispatch honours the input.
      BUILD_TYPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type || 'release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install Capacitor + plugins
        working-directory: mobile/android
        run: npm install

      - name: Generate native Android project (env=${{ matrix.env_name }})
        working-directory: mobile/android
        run: |
          npx cap add android || echo "android/ already exists, continuing"
          npx cap sync android

      # ---------------------------------------------------------------
      # AndroidManifest.xml + MainActivity patches.
      #
      # Capacitor's freshly-generated manifest ships with only the
      # INTERNET permission. The PWA we load uses html5-qrcode (table
      # QR scan) which calls navigator.mediaDevices.getUserMedia inside
      # the WebView — that fails silently if CAMERA / RECORD_AUDIO
      # aren't declared in the manifest. Same for navigator.vibrate
      # (needs VIBRATE). We inject them here so the OS knows what to
      # ask for, and override MainActivity to actually request the
      # runtime grant on first launch so the customer sees a prompt.
      # ---------------------------------------------------------------
      - name: Inject required permissions into AndroidManifest.xml
        working-directory: mobile/android/android/app/src/main
        shell: bash
        run: |
          python3 <<'PY'
          import re, pathlib
          p = pathlib.Path("AndroidManifest.xml")
          src = p.read_text()
          want_perms = [
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.CAMERA",
              "android.permission.RECORD_AUDIO",
              "android.permission.MODIFY_AUDIO_SETTINGS",
              "android.permission.VIBRATE",
          ]
          # Camera is mandatory — the app's primary entry point is the
          # table QR scan, so a device without a rear camera literally
          # can't use it. required="true" makes Play Store filter the
          # listing AND blocks sideload installs on camera-less devices
          # so users don't end up with a useless installed app.
          # Autofocus stays optional — older phones without AF can still
          # frame the QR code by holding the device farther away.
          want_features = [
              ("android.hardware.camera", "true"),
              ("android.hardware.camera.autofocus", "false"),
          ]
          inject = []
          for perm in want_perms:
              if perm not in src:
                  inject.append(f'    <uses-permission android:name="{perm}" />')
          for feat, required in want_features:
              if feat not in src:
                  inject.append(f'    <uses-feature android:name="{feat}" android:required="{required}" />')
          if inject:
              block = "\n" + "\n".join(inject) + "\n"
              src = re.sub(r'(\n\s*<application )', block + r'\1', src, count=1)
              p.write_text(src)
              print(f"Added {len(inject)} entries to AndroidManifest.xml")
          else:
              print("Manifest already has all required entries — no change")
          print(p.read_text())
          PY

      - name: Override MainActivity — make CAMERA mandatory
        working-directory: mobile/android/android/app/src/main/java
        shell: bash
        run: |
          MAIN=$(find . -name MainActivity.java | head -1)
          if [ -z "$MAIN" ]; then
            echo "::error::MainActivity.java not found"; exit 1;
          fi
          PKG=$(grep -oE 'package [a-zA-Z0-9._]+;' "$MAIN" | head -1 | sed -E 's/package (.*);/\1/')
          echo "Rewriting $MAIN (package=$PKG)"
          cat > "$MAIN" <<EOF
          package $PKG;

          import android.Manifest;
          import android.app.AlertDialog;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.Settings;

          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import com.getcapacitor.BridgeActivity;

          /**
           * VEZEOR customer wrapper entry point.
           *
           * Camera is treated as mandatory because the entire customer
           * journey starts with scanning a table QR code. If permission
           * is denied the app cannot meaningfully function, so we show
           * a blocking dialog that lets the user either grant via
           * Settings or exit. We re-check on resume so a permission
           * change made in Settings immediately unblocks the app.
           */
          public class MainActivity extends BridgeActivity {
              private static final int REQ_PERMS = 4242;
              private AlertDialog blockingDialog;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  ensureCameraOrBlock();
              }

              // BridgeActivity declares onResume as public, so the override
              // must match — Java refuses to weaken access (protected) here.
              @Override
              public void onResume() {
                  super.onResume();
                  // User may have toggled permission ON in Settings while
                  // the blocking dialog was visible — re-evaluate.
                  if (hasCameraPermission()) {
                      dismissBlockingDialog();
                  } else {
                      ensureCameraOrBlock();
                  }
              }

              private boolean hasCameraPermission() {
                  return ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA)
                          == PackageManager.PERMISSION_GRANTED;
              }

              private void ensureCameraOrBlock() {
                  if (hasCameraPermission()) {
                      dismissBlockingDialog();
                      return;
                  }
                  ActivityCompat.requestPermissions(this, new String[] {
                      Manifest.permission.CAMERA,
                      Manifest.permission.RECORD_AUDIO,
                  }, REQ_PERMS);
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode != REQ_PERMS) return;
                  if (!hasCameraPermission()) {
                      showBlockingDialog();
                  } else {
                      dismissBlockingDialog();
                  }
              }

              private void showBlockingDialog() {
                  if (blockingDialog != null && blockingDialog.isShowing()) return;
                  blockingDialog = new AlertDialog.Builder(this)
                      .setTitle("Camera access required")
                      .setMessage(
                          "VEZEOR needs camera access to scan table QR codes. "
                          + "Without it the app cannot function. Please enable "
                          + "Camera in Settings to continue."
                      )
                      .setCancelable(false)
                      .setPositiveButton("Open Settings", (d, w) -> {
                          Intent i = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS);
                          i.setData(Uri.fromParts("package", getPackageName(), null));
                          startActivity(i);
                      })
                      .setNegativeButton("Exit", (d, w) -> { finish(); System.exit(0); })
                      .create();
                  blockingDialog.show();
              }

              private void dismissBlockingDialog() {
                  if (blockingDialog != null) {
                      blockingDialog.dismiss();
                      blockingDialog = null;
                  }
              }
          }
          EOF
          echo "MainActivity rewritten:"
          head -40 "$MAIN"

      - name: Decode keystore (release builds only)
        if: env.BUILD_TYPE == 'release'
        working-directory: mobile/android/android
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::Release build requested but ANDROID_KEYSTORE_BASE64 secret is missing. Add the signing secrets or pick build_type=debug."
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          cat > keystore.properties <<EOF
          storeFile=$(pwd)/release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Patch app/build.gradle with signing block (release only, idempotent)
        if: env.BUILD_TYPE == 'release'
        working-directory: mobile/android/android/app
        shell: bash
        run: |
          if grep -q "release.keystore" build.gradle; then
            echo "Already patched"; exit 0;
          fi
          python3 <<'PY'
          import re, pathlib
          p = pathlib.Path("build.gradle")
          src = p.read_text()
          # Load keystore.properties at the top of the file.
          load_block = '''
          def keystorePropertiesFile = rootProject.file("keystore.properties")
          def keystoreProperties = new Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          '''
          if "keystorePropertiesFile" not in src:
              src = re.sub(r'(apply plugin: ["\']com\.android\.application["\'])',
                           r'\1\n' + load_block, src, count=1)
          # Insert signingConfigs.release inside the android {} block.
          if "signingConfigs.release" not in src and "signingConfigs {" not in src:
              signing = '''
              signingConfigs {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          storeFile file(keystoreProperties['storeFile'])
                          storePassword keystoreProperties['storePassword']
                          keyAlias keystoreProperties['keyAlias']
                          keyPassword keystoreProperties['keyPassword']
                      }
                  }
              }
          '''
              src = re.sub(r'(android\s*\{)', r'\1' + signing, src, count=1)
          # Make the `release` build type use the signing config.
          src = re.sub(r'(buildTypes\s*\{[^}]*?release\s*\{)',
                       r'\1\n            signingConfig signingConfigs.release',
                       src, count=1, flags=re.DOTALL)
          p.write_text(src)
          PY

      - name: Build APK
        working-directory: mobile/android/android
        shell: bash
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Locate and rename APK
        id: artifact
        working-directory: mobile/android/android
        shell: bash
        run: |
          APK_PATH=$(find app/build/outputs/apk -name '*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then echo "::error::No APK found"; exit 1; fi
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "main" ] || [ "$TAG" = "master" ]; then
            TAG="manual-$(date -u +%Y%m%d-%H%M%S)"
          fi
          OUT="vezeor-${{ matrix.env_name }}-${TAG}-${BUILD_TYPE}.apk"
          cp "$APK_PATH" "$OUT"
          echo "apk_path=mobile/android/android/$OUT" >> "$GITHUB_OUTPUT"
          echo "apk_name=$OUT" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.apk_name }}
          path: ${{ steps.artifact.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

  release:
    # Attach APKs to a GitHub Release only when a tag triggered the run.
    needs: build
    if: startsWith(github.ref, 'refs/tags/mobile-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: apks/*.apk
